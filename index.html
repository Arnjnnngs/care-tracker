function subscribeEntries(callback) {
  const q = query(col, orderBy("ts", "asc"));
  return onSnapshot(q, (snap) => {
    const entries = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    callback(entries);
  });
}
async function addEntryDB(entry) { await addDoc(col, entry); }
async function removeEntryDB(id) { await deleteDoc(doc(db, "caretracker_entries", id)); }
async function clearAllDB() {
  const q = query(col);
  const snap = await getDocs(q);
  const promises = snap.docs.map(d => deleteDoc(d.ref));
  await Promise.all(promises);
}

// ---------- React via htm + preact-like approach using vanilla ----------
// Using a minimal reactive approach with vanilla JS for zero build step

const MEDS = [
  { id:'tylenol', name:'Tylenol', sub:'Acetaminophen', type:'gap', gapH:4, ceiling:true, note:'Min 4-hour gap',
    doses:[{label:'500 mg',mg:500},{label:'1000 mg',mg:1000}] },
  { id:'zofran', name:'Zofran', sub:'Ondansetron', type:'gap', gapH:8, note:'Strict 8-hour gap' },
  { id:'compazine', name:'Compazine', sub:'Prochlorperazine', type:'gap', gapH:6, note:'Min 6h · evening/night preferred' },
  { id:'morphine', name:'Morphine', sub:'Immediate release', type:'gap', gapH:4, note:'4-hour gap',
    doses:[{label:'½ tab · 7.5 mg',mg:7.5},{label:'Full · 15 mg',mg:15}] },
  { id:'protonix', name:'Protonix', sub:'Pantoprazole', type:'win', note:'Twice daily · morning & evening',
    windows:[{start:5,end:12,name:'Morning'},{start:17,end:22,name:'Evening'}] },
  { id:'buspirone', name:'Buspirone', sub:'BuSpar', type:'win', note:'Once daily · evening only',
    windows:[{start:17,end:24,name:'Evening'}] },
  { id:'paroxetine', name:'Paroxetine', sub:'Paxil', type:'win', note:'Once daily · evening only',
    windows:[{start:17,end:24,name:'Evening'}] },
  { id:'iron', name:'Iron', sub:'Ferrous sulfate', type:'win', note:'Once daily · anytime',
    windows:[{start:0,end:24,name:'Anytime'}] },
];

const CONFIG = { patientName: 'Brandi', ceilingMg: 4000, tempUnit: 'Fahrenheit' };

// State
let state = { entries: [], now: Date.now(), toast: null, warn: null, demo: false, tab: 'today', override: null, tempInput: '', weightInput: '', weightRange: 'weeks', timeModal: null, loaded: false };
let toastTimer = null;
let unsub = null;
let pendingEntries = null;

function setState(patch) {
  Object.assign(state, patch);
  // Flush any deferred Firestore entries when the time modal closes
  if (!state.timeModal && pendingEntries) {
    state.entries = pendingEntries;
    pendingEntries = null;
  }
  render();
}

// Helpers
function dayStart(ts) { const d = new Date(ts); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }
function entriesFor(id) { return state.entries.filter(e => e.medId === id); }
function latest(id) { const es = entriesFor(id); return es.length ? es.reduce((a, b) => a.ts > b.ts ? a : b) : null; }
function tempSuffix() { return CONFIG.tempUnit === 'Celsius' ? '°C' : '°F'; }
function tempFever() { return CONFIG.tempUnit === 'Celsius' ? 38.0 : 100.4; }
function tempHigh() { return CONFIG.tempUnit === 'Celsius' ? 39.4 : 103; }
function tylenolMg() { const c = dayStart(state.now); return entriesFor('tylenol').filter(e => e.ts >= c).reduce((s, e) => s + (e.mg || 0), 0); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function fmtCountdown(ms) {
  if (ms <= 0) return '0m';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m >= 1) { if (m < 5) { const s = Math.floor((ms % 60000) / 1000); return m + 'm ' + s + 's'; } return m + 'm'; }
  return Math.max(1, Math.floor(ms / 1000)) + 's';
}
function nameOf(id) { if (id === 'temp') return 'Temperature'; if (id === 'weight') return 'Weight'; const m = MEDS.find(x => x.id === id); return m ? m.name : id; }
function nowLocalISO() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function fmtDateLabel(ts) {
  const d0 = dayStart(Date.now());
  const entryDay = dayStart(ts);
  const time = new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  const weekday = new Date(ts).toLocaleDateString([], { weekday: 'long' });
  const md = (new Date(ts).getMonth() + 1) + '/' + new Date(ts).getDate();
  if (entryDay === d0) {
    return 'Today - ' + weekday + ' ' + md + ' at ' + time;
  }
  return weekday + ', ' + md + ' at ' + time;
}

function status(med) {
  const now = state.now;
  const es = entriesFor(med.id).slice().sort((a, b) => a.ts - b.ts);
  if (med.type === 'gap') {
    const last = es[es.length - 1];
    if (!last) return { locked: false };
    const at = last.ts + med.gapH * 3600000;
    return { locked: now < at, availableAt: at };
  }
  const d0 = dayStart(now), atH = (h) => d0 + h * 3600000;
  for (const w of med.windows) {
    const ws = atH(w.start), we = atH(w.end);
    const used = es.some(e => e.ts >= ws && e.ts < we);
    if (used) continue;
    if (now < ws) return { locked: true, availableAt: ws, windowName: w.name };
    if (now >= ws && now < we) return { locked: false, windowName: w.name };
  }
  const first = med.windows[0];
  return { locked: true, availableAt: d0 + 86400000 + first.start * 3600000, windowName: first.name };
}

function setToast(msg) {
  setState({ toast: msg });
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => setState({ toast: null }), 4500);
}

function afterLog(entry) {
  const twoH = 2 * 3600000;
  if (entry.medId === 'iron' || entry.medId === 'protonix') {
    const other = entry.medId === 'iron' ? 'protonix' : 'iron';
    const near = state.entries.find(e => e.medId === other && e.id !== entry.id && Math.abs(e.ts - entry.ts) <= twoH);
    if (near) { setState({ warn: { tone: 'amber', title: 'Iron + Protonix timing', body: 'Iron and Protonix were logged within 2 hours of each other. Protonix (a PPI) lowers stomach acid, which can markedly reduce iron absorption. Aim to separate the two by at least 2 hours.' } }); return; }
  }
  if (entry.medId === 'tylenol') {
    const mg = tylenolMg();
    if (mg > CONFIG.ceilingMg) { setState({ warn: { tone: 'red', title: 'Acetaminophen ceiling exceeded', body: 'Today’s Tylenol total is ' + mg.toLocaleString() + ' mg, above the ' + CONFIG.ceilingMg.toLocaleString() + ' mg / 24 h limit. Do not give more without contacting the care team.' } }); }
  }
}

async function logMed(medId, dose, opts) {
  opts = opts || {};
  const med = MEDS.find(m => m.id === medId);
  const st = status(med);
  if (st.locked && !opts.force) { setState({ override: { medId } }); return; }
  setState({ override: null, timeModal: { type: 'med', medId, dose, opts, timeValue: nowLocalISO() } });
}

async function logTemp() {
  const raw = (state.tempInput || '').trim();
  const v = parseFloat(raw);
  if (!raw || isNaN(v) || v <= 0 || v > 120) { setToast('Enter a valid temperature'); return; }
  setState({ timeModal: { type: 'temp', tempValue: v, timeValue: nowLocalISO() } });
}

async function logWeight() {
  const raw = (state.weightInput || '').trim();
  const v = parseFloat(raw);
  if (!raw || isNaN(v) || v <= 0 || v > 999) { setToast('Enter a valid weight'); return; }
  setState({ timeModal: { type: 'weight', weightValue: v, timeValue: nowLocalISO() } });
}

async function confirmTimeAndLog() {
  const m = state.timeModal;
  if (!m) return;
  const ts = new Date(m.timeValue).getTime();
  if (isNaN(ts)) { setToast('Invalid time'); return; }

  if (m.type === 'med') {
    const med = MEDS.find(x => x.id === m.medId);
    const entry = { medId: m.medId, dose: m.dose ? m.dose.label : null, mg: m.dose ? m.dose.mg : 0, ts };
    if (m.opts && m.opts.force) entry.override = true;
    setState({ timeModal: null });
    await addEntryDB(entry);
    setToast(med.name + ' logged' + (m.dose ? (' · ' + m.dose.label) : '') + (m.opts && m.opts.force ? ' (early)' : '') + ' at ' + fmtTime(ts));
    setTimeout(() => afterLog({ ...entry, id: 'pending' }), 500);
  } else if (m.type === 'temp') {
    const v = m.tempValue;
    const suffix = tempSuffix();
    const entry = { medId: 'temp', temp: v, dose: v + ' ' + suffix, mg: 0, ts };
    setState({ tempInput: '', timeModal: null });
    await addEntryDB(entry);
    setToast('Temperature ' + v + ' ' + suffix + ' logged at ' + fmtTime(ts));
  } else if (m.type === 'weight') {
    const v = m.weightValue;
    const entry = { medId: 'weight', weight: v, dose: v + ' lbs', mg: 0, ts };
    setState({ weightInput: '', timeModal: null });
    await addEntryDB(entry);
    setToast('Weight ' + v + ' lbs logged at ' + fmtTime(ts));
  }
}

async function removeEntry(id) {
  await removeEntryDB(id);
}

async function clearAll() {
  await clearAllDB();
  setState({ demo: false, warn: null, override: null });
  setToast('All entries cleared');
}

// Lock SVG
const lockSVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5C6662" stroke-width="2.4"><rect x="4" y="10.5" width="16" height="10" rx="2"></rect><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"></path></svg>';

// --------- Render ---------
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'innerHTML') {
        el.innerHTML = v;
      } else if (k === 'className') {
        el.className = v;
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number' ? document.createTextNode(String(child)) : child);
  }
  return el;
}

  const nowLabel = fmtTime(now);

  // Build page

            'Live sync'
          )

    ),
    // Sticky tab switch
    h('div', { style: { position: 'sticky', top: '60px', zIndex: '15', background: 'rgba(10,10,10,0.6)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', padding: '8px 16px 6px' } },
      h('div', { style: { maxWidth: '720px', margin: '0 auto', display: 'flex', gap: '5px', background: 'rgba(255,255,255,0.05)', borderRadius: '13px', padding: '4px', border: '1px solid rgba(255,255,255,0.08)' } },
        h('button', { onClick: () => setState({ tab: 'today' }), style: { flex: '1', minHeight: '42px', borderRadius: '10px', background: state.tab === 'today' ? '#0F9D6B' : 'transparent', color: state.tab === 'today' ? '#fff' : '#8B9590', fontSize: '14px', fontWeight: '700', boxShadow: state.tab === 'today' ? '0 1px 3px rgba(15,157,107,0.35)' : 'none' } }, 'Today'),

  } else {
    title = 'Log Weight · ' + m.weightValue + ' lbs';

  return h('div', { style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: '60', padding: '20px' }, onClick: (e) => { if (e.target === e.currentTarget) setState({ timeModal: null }); } },

function renderHistory(now) {
  const d0 = dayStart(now);
  const yStart = d0 - 86400000;
  const dmap = {};
  state.entries.forEach(e => { const k = dayStart(e.ts); (dmap[k] = dmap[k] || []).push(e); });

  const historyDays = Object.keys(dmap).map(k => +k).sort((a, b) => b - a).map(k => {
    const items = dmap[k].slice().sort((a, b) => a.ts - b.ts);
    const tyDay = items.filter(e => e.medId === 'tylenol').reduce((s, e) => s + (e.mg || 0), 0);
    const doses = items.filter(e => e.medId !== 'temp' && e.medId !== 'weight').length;
    const temps = items.filter(e => e.medId === 'temp').length;
    const weights = items.filter(e => e.medId === 'weight').length;
    const wkday = new Date(k).toLocaleDateString([], { weekday: 'long' });
    const md = (new Date(k).getMonth() + 1) + '/' + new Date(k).getDate();
    const label = k === d0 ? ('Today - ' + wkday + ' ' + md) : (wkday + ', ' + md);
    let summary = doses + ' dose' + (doses === 1 ? '' : 's');
    if (temps) summary += ' · ' + temps + ' temp' + (temps === 1 ? '' : 's');
    if (weights) summary += ' · ' + weights + ' wt';
    if (tyDay) summary += ' · ' + tyDay.toLocaleString() + ' mg APAP';
    return { key: k, label, summary, items };
  });

  if (historyDays.length === 0) {
    return [h('div', { style: { background: 'rgba(255,255,255,0.03)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', border: '1px dashed rgba(255,255,255,0.1)', borderRadius: '16px', padding: '30px', textAlign: 'center', color: '#5C6662', fontSize: '14px', lineHeight: '1.5' } }, 'No history yet.')];
  }

  return [h('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } },
    ...historyDays.map(d => h('div', null,
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '10px', marginBottom: '8px' } },
        h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.03em', textTransform: 'uppercase', color: '#8B9590' } }, d.label),
        h('div', { className: 'mono', style: { fontSize: '12px', color: '#5C6662' } }, d.summary)
      ),
      h('div', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06)' } },
        ...d.items.map((e, i) => h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 14px', borderTop: i > 0 ? '1px solid rgba(255,255,255,0.06)' : 'none' } },
          h('div', { className: 'mono', style: { fontSize: '13px', color: '#8B9590', minWidth: '66px' } }, fmtTime(e.ts)),
          h('div', { style: { flex: '1' } },
            h('div', { style: { fontSize: '15px', fontWeight: '700', display: 'flex', alignItems: 'center', gap: '7px', flexWrap: 'wrap' } },
              nameOf(e.medId),
              e.override ? h('span', { style: { fontSize: '10.5px', fontWeight: '700', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#F08880', background: 'rgba(192,69,59,0.15)', border: '1px solid rgba(192,69,59,0.3)', borderRadius: '6px', padding: '1px 6px' } }, 'Early') : null
            ),
            e.dose ? h('div', { style: { fontSize: '12.5px', color: '#8B9590' } }, e.dose) : null
          ),
          h('button', { onClick: () => removeEntry(e.id), style: { color: '#F08880', fontSize: '12.5px', padding: '6px' } }, 'Remove')
        ))
      )
    ))
  )];
}

    return [
      toggle,
      h('div', { style: { background: 'rgba(255,255,255,0.03)', border: '1px dashed rgba(255,255,255,0.1)', borderRadius: '16px', padding: '40px', textAlign: 'center', color: '#5C6662', fontSize: '14px', lineHeight: '1.5' } }, 'No weight readings logged yet.\nLog your first weight on the Today tab.')
    ];
  }

  // Determine time range
  const spanDays = range === 'weeks' ? 28 : 90;
  const minTs = now - spanDays * DAY;
  const filtered = weightEntries.filter(e => e.ts >= minTs);
  const points = filtered.length > 0 ? filtered : weightEntries.slice(-2);

  if (points.length === 0) {
    return [toggle, h('div', { style: { color: '#5C6662', fontSize: '14px', textAlign: 'center', padding: '40px' } }, 'No data in this range.')];
  }

  // Calculate bounds
  const weights = points.map(p => p.weight);
  const allWeights = weightEntries.map(p => p.weight);
  const minW = Math.floor(Math.min(...weights) - 2);
  const maxW = Math.ceil(Math.max(...weights) + 2);
  const wRange = maxW - minW || 4;
  const tMin = points[0].ts;
  const tMax = Math.max(points[points.length - 1].ts, tMin + DAY);
  const tRange = tMax - tMin || DAY;

  // SVG dimensions
  const W = 680, H = 300;
  const pad = { top: 30, right: 20, bottom: 50, left: 55 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const x = (ts) => pad.left + ((ts - tMin) / tRange) * cW;
  const y = (w) => pad.top + cH - ((w - minW) / wRange) * cH;

  // Build SVG path
  let pathD = '';
  let areaD = '';
  const dots = [];
  points.forEach((p, i) => {
    const px = x(p.ts), py = y(p.weight);
    pathD += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
    if (i === 0) areaD = 'M' + px.toFixed(1) + ',' + (pad.top + cH);
    areaD += 'L' + px.toFixed(1) + ',' + py.toFixed(1);
    dots.push({ x: px, y: py, w: p.weight, ts: p.ts });
  });
  areaD += 'L' + x(points[points.length - 1].ts).toFixed(1) + ',' + (pad.top + cH) + 'Z';

  // Y-axis labels (weight)
  const ySteps = 5;
  const yLabels = [];
  for (let i = 0; i <= ySteps; i++) {
    const val = minW + (wRange / ySteps) * i;
    yLabels.push({ val: Math.round(val * 10) / 10, py: y(val) });
  }

  // X-axis labels (dates)
  const xLabels = [];
  const labelCount = range === 'weeks' ? 4 : 6;
  for (let i = 0; i <= labelCount; i++) {
    const ts = tMin + (tRange / labelCount) * i;
    const d = new Date(ts);
    const label = (d.getMonth() + 1) + '/' + d.getDate();
    xLabels.push({ label, px: x(ts) });
  }

  // Stats
  const latest = points[points.length - 1];
  const first = points[0];
  const change = latest.weight - first.weight;
  const changeLabel = (change >= 0 ? '+' : '') + change.toFixed(1) + ' lbs';
  const changeColor = Math.abs(change) < 0.5 ? '#8B9590' : change > 0 ? '#B5761E' : '#0F9D6B';
  const avg = (weights.reduce((s, w) => s + w, 0) / weights.length).toFixed(1);

  // Build SVG as string
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">';
  // Grid lines
  yLabels.forEach(yl => {
    svg += '<line x1="' + pad.left + '" y1="' + yl.py.toFixed(1) + '" x2="' + (W - pad.right) + '" y2="' + yl.py.toFixed(1) + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    svg += '<text x="' + (pad.left - 10) + '" y="' + (yl.py + 4).toFixed(1) + '" fill="#5C6662" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="end">' + yl.val + '</text>';
  });
  // X labels
  xLabels.forEach(xl => {
    svg += '<text x="' + xl.px.toFixed(1) + '" y="' + (H - 10) + '" fill="#5C6662" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + xl.label + '</text>';
  });
  // Area gradient
  svg += '<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(74,126,181,0.25)"/><stop offset="100%" stop-color="rgba(74,126,181,0)"/></linearGradient></defs>';
  svg += '<path d="' + areaD + '" fill="url(#wg)"/>';
  // Line
  svg += '<path d="' + pathD + '" fill="none" stroke="#4A7EB5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  // Dots
  dots.forEach((d, i) => {
    const isLast = i === dots.length - 1;
    svg += '<circle cx="' + d.x.toFixed(1) + '" cy="' + d.y.toFixed(1) + '" r="' + (isLast ? 5 : 3.5) + '" fill="' + (isLast ? '#4A7EB5' : '#2C4A73') + '" stroke="' + (isLast ? '#C8DEFF' : '#4A7EB5') + '" stroke-width="' + (isLast ? 2 : 1.5) + '"/>';
    // Value label on last dot
    if (isLast) {
      svg += '<text x="' + d.x.toFixed(1) + '" y="' + (d.y - 12).toFixed(1) + '" fill="#C8DEFF" font-size="13" font-weight="700" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + d.w + '</text>';
    }
  });
  svg += '</svg>';

  // Chart card
  const chart = h('section', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '18px', padding: '20px 16px 12px', boxShadow: '0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06)' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' } },
      h('div', null,
        h('div', { style: { fontSize: '11.5px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#8B9590' } }, 'Weight Trend'),
        h('div', { style: { fontSize: '12.5px', color: '#5C6662', marginTop: '3px' } }, range === 'weeks' ? 'Last 4 weeks' : 'Last 3 months')
      ),
      h('div', { className: 'mono', style: { fontSize: '24px', fontWeight: '700', color: '#C8DEFF', letterSpacing: '-0.02em' } }, latest.weight + ' lbs')
    ),
    h('div', { innerHTML: svg })
  );

  // Stats row
  const stats = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '10px' } },
    h('div', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#5C6662', marginBottom: '6px' } }, 'Current'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#E8EBE9' } }, latest.weight + '')
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#5C6662', marginBottom: '6px' } }, 'Average'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#E8EBE9' } }, avg)
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#5C6662', marginBottom: '6px' } }, 'Change'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: changeColor } }, changeLabel)
    )
  );

  // Readings list
  const readingsItems = points.slice().reverse().map((p, i) => {
    const d = new Date(p.ts);
    const day = d.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' });
    const time = fmtTime(p.ts);
    return h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '11px 14px', borderTop: i > 0 ? '1px solid rgba(255,255,255,0.06)' : 'none' } },
      h('div', { style: { flex: '1' } },
        h('div', { style: { fontSize: '14px', fontWeight: '700' } }, day),
        h('div', { style: { fontSize: '12px', color: '#5C6662' } }, time)
      ),
      h('div', { className: 'mono', style: { fontSize: '16px', fontWeight: '600', color: '#C8DEFF' } }, p.weight + ' lbs')
    );
  });

  const readings = h('section', null,
    h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#8B9590', marginBottom: '10px' } }, 'All Readings'),
    h('div', { style: { background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06)' } },
      ...readingsItems
    )
  );

  return [toggle, chart, stats, readings];
}

// Init
unsub = subscribeEntries((entries) => {
  const wasEmpty = state.entries.length === 0 && !state.loaded;
  if (state.timeModal) {
    // Defer update so the modal isn't destroyed mid-interaction
    pendingEntries = entries;
    if (!state.loaded) { state.loaded = true; state.entries = entries; }
    return;
  }
  setState({ entries, loaded: true });
  // If first load and no entries, offer to seed demo data
  if (wasEmpty && entries.length === 0) {
    seedDemo();
  }
});

setInterval(() => {
  state.now = Date.now();
  if (!state.timeModal) render();
}, 1000);
render();

// Service worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
