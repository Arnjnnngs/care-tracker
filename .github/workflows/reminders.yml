name: Send Med Reminders

on:
  schedule:
    # Every 30 minutes from 8 AM through the 10:00 PM send, Central time.
    # 0-4 UTC keeps the 10:00 PM run covered in BOTH daylight (CDT, 03:00 UTC)
    # and standard (CST, 04:00 UTC) time; quiet hours in send-reminders.js
    # silence any extra late runs.
    - cron: '0,30 13-23 * * *'
    - cron: '0,30 0-4 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@12

      - name: Send notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-reminders.js
