name: Send Med Reminders

on:
  schedule:
    # Every 30 minutes from 8 AM to 10 PM CDT (1 PM to 3 AM UTC during CDT/summer)
    # Covers: scheduled meds at 8:30 AM and 8 PM, plus Zofran gap checks throughout the day
    # 1 PM - 3 AM UTC = 8 AM - 10 PM CDT
    - cron: '0,30 13-23 * * *'
    - cron: '0,30 0-3 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin@12

      - name: Send notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-reminders.js
